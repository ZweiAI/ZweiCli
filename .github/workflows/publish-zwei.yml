name: publish-zwei

# Build + publish the Zwei CLI to npm.
#
# Two ways to trigger:
#
# 1. Push a tag   — e.g. `git tag v0.2.0 && git push --tags`
#    - `v0.2.0`           → version=0.2.0,     channel=latest
#    - `v0.2.0-beta.1`    → version=0.2.0-beta.1, channel=beta
#    - `v0.2.0-rc.1`      → version=0.2.0-rc.1,  channel=rc
#    (anything after the first hyphen is the prerelease id; that id becomes
#    the npm dist-tag so you don't clobber `latest` with a prerelease.)
#
# 2. Manual (Actions → publish-zwei → Run workflow)
#    - For one-off or experimental releases. Supply version + channel +
#      dry_run explicitly. Useful when you want dry_run=true before a tag.
#
# Produces:
#   - @zweicli/{platform}-{arch}   per-platform native binary packages
#   - zweicli                      meta-package with optionalDependencies
#
# Required secrets:
#   NPM_TOKEN — npm token with publish access to `zweicli` and `@zweicli` scope.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (semver, no "v" prefix), e.g. 0.1.0'
        required: true
        type: string
      channel:
        description: "npm dist-tag (default: latest)"
        required: false
        default: "latest"
        type: string
      dry_run:
        description: "npm publish --dry-run (no actual publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency: ${{ github.workflow }}-${{ inputs.version || github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  # Resolve version/channel/dry_run from either the pushed tag or the manual
  # dispatch inputs. Downstream jobs read these outputs — that way the build
  # and publish steps are identical for both triggers.
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-driven. Strip leading "v".
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
            # Prerelease id = substring after first hyphen in the version.
            # e.g. 0.2.0-beta.1 -> "beta.1" -> dist-tag "beta"
            if [[ "$version" == *-* ]]; then
              pre="${version#*-}"
              channel="${pre%%.*}"
            else
              channel="latest"
            fi
            dry_run=""
          else
            version="${{ inputs.version }}"
            channel="${{ inputs.channel }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then dry_run="1"; else dry_run=""; fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"
          echo "resolved: version=$version channel=$channel dry_run='$dry_run'"

  # Build native binaries across all supported platforms in parallel.
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            node_os: linux
            node_arch: x64
          - host: macos-14           # Apple Silicon
            node_os: darwin
            node_arch: arm64
          # macos-13 (Intel) runner was deprecated by GitHub; Intel Macs are EOL.
          - host: windows-2022
            node_os: win32
            node_arch: x64
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        # --ignore-scripts skips electron's ~200 MB Chromium download and any
        # other postinstall hooks we don't need for the AOT-compiled zwei
        # binary. Electron was hanging the Windows runner for 10+ min.
        run: bun install --frozen-lockfile --ignore-scripts
        timeout-minutes: 10
      - name: Build zwei native binary for this platform
        working-directory: packages/zwei
        run: bun run script/build.ts --single --skip-embed-web-ui
        env:
          ZWEI_VERSION: ${{ needs.meta.outputs.version }}
      - name: Post-process into zwei-* packages
        working-directory: packages/zwei
        run: bun run script/build-zwei.ts
      - name: Upload zwei dist for this platform
        uses: actions/upload-artifact@v4
        with:
          name: zwei-dist-${{ matrix.node_os }}-${{ matrix.node_arch }}
          path: packages/zwei/dist/zwei-*
          if-no-files-found: error

  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install deps
        # --ignore-scripts skips electron's ~200 MB Chromium download and any
        # other postinstall hooks we don't need for the AOT-compiled zwei
        # binary. Electron was hanging the Windows runner for 10+ min.
        run: bun install --frozen-lockfile --ignore-scripts
        timeout-minutes: 10
      - name: Download all platform dists
        uses: actions/download-artifact@v4
        with:
          pattern: zwei-dist-*
          path: packages/zwei/dist
          merge-multiple: true
      - name: List dist layout (debug)
        run: ls -R packages/zwei/dist
      - name: Publish to npm
        working-directory: packages/zwei
        run: bun run script/publish-zwei.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          ZWEI_VERSION: ${{ needs.meta.outputs.version }}
          ZWEI_CHANNEL: ${{ needs.meta.outputs.channel }}
          ZWEI_DRY_RUN: ${{ needs.meta.outputs.dry_run }}
          ZWEI_REPO: ${{ github.server_url }}/${{ github.repository }}
